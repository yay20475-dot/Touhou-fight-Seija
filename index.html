let timeStop = 0;

let edgeProgress = 0;

let mirror = false;
let mirrorTimer = 0;

let invert = false;
let invertTimer = 0;

let flip = false;
let flipTimer = 0;

let spin = 0;

        let gameStarted = false, currentPlayer = "reimu", isGameOver = false;

let arrows = [];

let player = {

function getHitbox() {

}

        class Bullet {
            constructor(x, y, angle, speed, color, radius = 4, damage = 1.8, isHoming = false) {
                this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.radius = radius; this.damage = damage; this.isHoming = isHoming;
            }
            update() {
                if (this.isHoming) {
                    let angleToBoss = Math.atan2(boss.y - this.y, boss.x - this.x);
                    this.vx += Math.cos(angleToBoss) * 0.5;
                    this.vy += Math.sin(angleToBoss) * 0.5;
                    let speed = Math.hypot(this.vx, this.vy);
                    if (speed > 8) { this.vx *= 8/speed; this.vy *= 8/speed; }
                }
                this.x += this.vx; this.y += this.vy;

            }

            draw() {

if (currentPlayer === "sakuya" && this.isHoming) {

    ctx.save();

    let angle = Math.atan2(this.vy, this.vx);
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // 🔷 thân dao (xanh biển)
    ctx.fillStyle = "#3399ff";
    ctx.fillRect(-14, -2, 24, 4);

    // 🔷 đầu dao (dài + nhọn hơn)
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(18, 0);
    ctx.lineTo(10, 4);
    ctx.closePath();
    ctx.fill();

    // ✝️ thanh dọc (thập giá ngược)
    ctx.fillRect(-10, -10, 4, 20);

    // ✨ lõi sáng
    ctx.fillStyle = "white";
    ctx.fillRect(-14, -1, 24, 2);
    ctx.fillRect(-9, -7, 2, 14);

    // 🌟 glow xanh nhẹ
    ctx.strokeStyle = "rgba(100,180,255,0.7)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-14, -2, 24, 4);

    ctx.restore();

    return;
}

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                if (this.isHoming) { // Hiệu ứng hào quang cho Orb của Reimu
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                }
            }
        }

class Arrow {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;

        this.vx = Math.cos(angle) * 2;
        this.vy = Math.sin(angle) * 2;

        this.timer = 0;
        this.state = "move"; // move → stop → explode
    }

    update() {
        this.timer++;

        if (this.state === "move") {
            this.x += this.vx;
            this.y += this.vy;

            if (this.timer > 30) {
                this.state = "stop";
                this.vx = 0;
                this.vy = 0;
            }
        } 
        else if (this.state === "stop") {
            if (this.timer > 70) {
                this.explode();
                this.dead = true;
            }
        }
    }

    explode() {
        // 💥 nổ thành vòng đạn nhỏ
        for (let i = 0; i < 12; i++) {
            enemyBullets.push(new Bullet(
                this.x,
                this.y,
                i * Math.PI * 2 / 12,
                2.5,
                "#ffaa00",
                3
            ));
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // 🏹 thân mũi tên
        ctx.fillStyle = "#ffaa00";
        ctx.fillRect(-10, -2, 20, 4);

        // đầu nhọn
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(16, -4);
        ctx.lineTo(16, 4);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

        class Laser {
    constructor() {
        this.reset();
    }

    reset() {
        this.timer = 0;

        // 🎲 random hướng
        this.side = Math.random() < 0.5 ? "left" : "right";

        this.currentX = (this.side === "left") ? -300 : canvas.width + 300;
        this.speed = (this.side === "left") ? 5 : -5;

        this.targetY = player.y;
        this.active = true;
        this.firing = false;
    }

    update() {
        this.timer++;

        // lock vị trí player lúc bắt đầu
        if (this.timer === 1) {
            this.targetY = player.y;
        }

        // bắt đầu bắn ngay
        if (this.timer > 10) {
            this.firing = true;
        }

        // 🚀 bay thẳng luôn (mượt hơn lerp)
        this.currentX += this.speed;

        // ra khỏi màn → reset
        if (
            this.currentX < -400 ||
            this.currentX > canvas.width + 400
        ) {
            this.reset();
        }
    }

    draw() {
        if (!this.active) return;

        let length = canvas.width;
        let thickness = 18;

        ctx.save();
        ctx.translate(this.currentX, this.targetY);

        // glow
        ctx.fillStyle = "rgba(255,200,0,0.15)";
        ctx.fillRect(-length/2, -thickness, length, thickness*2);

        // laser chính
        ctx.fillStyle = this.firing ? "#ff4444" : "#ffaa00";
        ctx.fillRect(-length/2, -thickness/2, length, thickness);

        // lõi trắng
        ctx.fillStyle = "white";
        ctx.fillRect(-length/2, -3, length, 6);

        ctx.restore();
    }
}
        lasers = [new Laser()];

        document.getElementById("start-overlay").addEventListener("touchstart", () => {
            gameStarted = true; document.getElementById("start-overlay").style.display = "none"; requestAnimationFrame(draw);
        }, { once: true });

let lastTouchX = null;
let lastTouchY = null;

window.addEventListener("touchstart", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;

}, { passive: false });

window.addEventListener("touchmove", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    e.preventDefault();

    let touchX = e.touches[0].clientX;
    let touchY = e.touches[0].clientY;

    // 👆 lượng vuốt
    let dx = touchX - lastTouchX;
    let dy = touchY - lastTouchY;

    // 🎮 di chuyển kiểu swipe
    player.x += dx;
    player.y += dy;

    // cập nhật touch cuối
    lastTouchX = touchX;
    lastTouchY = touchY;

    // giới hạn màn hình
    player.x = Math.max(10, Math.min(canvas.width - 10, player.x));
    player.y = Math.max(10, Math.min(canvas.height - 10, player.y));

}, { passive: false });

window.addEventListener("touchend", () => {

    lastTouchX = null;
    lastTouchY = null;

});

document.getElementById("switch-btn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (isGameOver) return;

   if (currentPlayer === "reimu") currentPlayer = "marisa";
else if (currentPlayer === "marisa") currentPlayer = "sakuya";
else currentPlayer = "reimu";

    document.getElementById("char-name").innerText = currentPlayer.toUpperCase();
    document.getElementById("char-name").style.color =
    (currentPlayer === "reimu") ? "#44aaff" :
    (currentPlayer === "marisa") ? "#ffff00" :
    "#cccccc";
});

        document.getElementById("bomb-btn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            if (player.bombs > 0 && !isGameOver && bombTimer === 0) {
                player.bombs--; document.getElementById("bomb-val").innerText = player.bombs;
                bombTimer = 120; shake = 10; player.invuln = 150;
                if (currentPlayer === "reimu") { // Fantasy Seal
                    for (let i = 0; i < 7; i++) {
                        bombEffects.push(new Bullet(player.x, player.y, (i * Math.PI * 2 / 7), 5, "#ff0088", 12, 60, true));
                    }
                }

if (currentPlayer === "sakuya") {
    timeStop = 120;

    // 💥 bắn dao mọi hướng
    for (let i = 0; i < 40; i++) {
        let angle = (i / 40) * Math.PI * 2;

        playerBullets.push(
            new Bullet(
                player.x,
                player.y,
                angle,
                10,
                "#3399ff",
                3,
                15,
                true // 👈 QUAN TRỌNG: homing để hiện dao
            )
        );
    }
}

                if (navigator.vibrate) navigator.vibrate(200);
            }
        });

        function spawnDanmaku() {

if (timeStop > 0) return;

            frame++; let cycle = frame % 2200;
            if (timeStop <= 0) {
    boss.x = (canvas.width/2) + Math.sin(frame * 0.01) * (canvas.width/4);
}
            if (bombTimer > 0) { enemyBullets = []; return; } // Clear bullets during bomb

if (cycle < 400) {

    if (frame % 4 === 0) {

        // ⏱️ Xác định xem đang ở giây chẵn hay giây lẻ
        let currentSecond = Math.floor(frame / 60);
        let base;

        if (currentSecond % 2 === 0) {
            // Giây chẵn: Xoay xuôi (Cộng góc)
            base = frame * 0.02;
        } else {
            // Giây lẻ: Xoay ngược ngay lập tức (Trừ góc)
            base = -frame * 0.02;
        }

        for (let i = 0; i < 12; i++) {

            let ang = base + i * Math.PI * 2 / 12;

            let b = new Bullet(
                boss.x,
                boss.y,
                ang,
                1.2,          // 🐢 chậm lúc đầu
                "blue",
                5
            );

            // 🔥 trạng thái Seija
            b.timer = 0;
            b.state = 0; // 0 = đen chậm, 1 = trắng nhanh, 2 = đen chậm lại

            b.update = function() {

                this.timer++;

                // 🖤 GIAI ĐOẠN 1: đen - chậm
                if (this.state === 0 && this.timer > 40) {
                    this.state = 1;
                    this.color = "red";

                    // 🚀 tăng tốc mạnh
                    let speed = 5;
                    let ang = Math.atan2(this.vy, this.vx);
                    this.vx = Math.cos(ang) * speed;
                    this.vy = Math.sin(ang) * speed;
                }

                // 🤍 GIAI ĐOẠN 2: trắng - nhanh
                if (this.state === 1 && this.timer > 80) {
                    this.state = 2;
                    this.color = "blue";

                    // 🐢 giảm tốc
                    let speed = 1.5;
                    let ang = Math.atan2(this.vy, this.vx);
                    this.vx = Math.cos(ang) * speed;
                    this.vy = Math.sin(ang) * speed;
                }

                this.x += this.vx;
                this.y += this.vy;
            };

            enemyBullets.push(b);
        }
    }

} else if (cycle < 800) {

    // Pattern 2: giống Pattern 1 nhưng góc bắn hơi random
    if (frame % 12 === 0) {

        let base = frame * 0.02 + (Math.random() - 0.5) * 1.2;

        for (let i = 0; i < 20; i++) {

            let ang =
                base +
                i * Math.PI * 2 / 20 +
                (Math.random() - 0.5) * 0.15;

            let b = new Bullet(
                boss.x,
                boss.y,
                ang,
                1.2,
                "blue",
                5
            );

            b.timer = 0;
            b.state = 0;

            b.update = function () {

                this.timer++;

                if (this.state === 0 && this.timer > 40) {
                    this.state = 1;
                    this.color = "red";

                    let speed = 5;
                    let a = Math.atan2(this.vy, this.vx);
                    this.vx = Math.cos(a) * speed;
                    this.vy = Math.sin(a) * speed;
                }

                if (this.state === 1 && this.timer > 80) {
                    this.state = 2;
                    this.color = "blue";

                    let speed = 1.5;
                    let a = Math.atan2(this.vy, this.vx);
                    this.vx = Math.cos(a) * speed;
                    this.vy = Math.sin(a) * speed;
                }

                this.x += this.vx;
                this.y += this.vy;
            };

            enemyBullets.push(b);
        }
    }
}

else if (cycle < 1000) {

    // ⏱️ đảo màu
    invertTimer++;

    if (invertTimer > 90) {
        invert = !invert;
        invertTimer = 0;
    }

    // ↔️ lật trái phải
    mirrorTimer++;

    if (mirrorTimer > 120) {
        mirror = !mirror;
        mirrorTimer = 0;
    }

    const gapSize = 0.85;

    let spin = frame * 0.12;

    if (frame % 6 === 0) {

        if (Math.random() < 0.5) {
            spin += (Math.random() - 0.5) * Math.PI * 1.8;
        }

        spin += Math.sin(frame * 0.2) * 0.8;

        for (let i = 0; i < 30; i++) {

            let t = i / 30;

            let hole = Math.cos(t * Math.PI * 2 + frame * 0.05);

            if (hole > gapSize) continue;

            enemyBullets.push(
                new Bullet(
                    boss.x,
                    boss.y,
                    spin + t * Math.PI * 2,
                    2.6,
                    "#ffffff",
                    3
                )
            );
        }
    }

} else if (cycle < 2000) {

    flipTimer++;

    if (flipTimer > 120) {
        flip = !flip;
        flipTimer = 0;
    }

    // 💀 Đạn tím to
    if (frame % 40 === 0) {

        let count = 6;

        for (let i = 0; i < count; i++) {

            let ang = (i / count) * Math.PI * 2 + frame * 0.01;

            enemyBullets.push(new Bullet(
                boss.x,
                boss.y,
                ang,
                2,
                "#ff66ff",
                14,
                4
            ));
        }
    }

    // 🔵 2 tia xanh xuất phát đồng thời từ dưới đáy và bò quanh màn hình

    edgeProgress += 0.0025;

    if (edgeProgress >= 4) {
        edgeProgress = 0;
    }

    if (frame % 15 === 0) {

        // --- TIA 1: Xuất phát từ DƯỚI - TRÁI và chạy theo chiều kim đồng hồ ---
        let x1, y1, angle1;
        let t = edgeProgress;

        if (t < 1) {
            // Đáy: Chạy từ Dưới-Trái -> Dưới-Phải
            x1 = canvas.width * t;
            y1 = canvas.height;
            angle1 = -Math.PI * 3 / 4;
        } else if (t < 2) {
            // Cạnh phải: Bò từ Dưới-Phải -> Trên-Phải
            x1 = canvas.width;
            y1 = canvas.height * (2 - t);
            angle1 = Math.PI * 3 / 4;
        } else if (t < 3) {
            // Đỉnh: Chạy từ Trên-Phải -> Trên-Trái
            x1 = canvas.width * (3 - t);
            y1 = 0;
            angle1 = Math.PI / 4;
        } else {
            // Cạnh trái: Bò từ Trên-Trái -> Dưới-Trái
            x1 = 0;
            y1 = canvas.height * (t - 3);
            angle1 = -Math.PI / 4;
        }

        // --- TIA 2: Xuất phát từ DƯỚI - PHẢI và chạy ngược chiều kim đồng hồ ---
        let x2, y2, angle2;

        if (t < 1) {
            // Đáy: Chạy từ Dưới-Phải -> Dưới-Trái
            x2 = canvas.width * (1 - t);
            y2 = canvas.height;
            angle2 = -Math.PI / 4;
        } else if (t < 2) {
            // Cạnh trái: Bò từ Dưới-Trái -> Trên-Trái
            x2 = 0;
            y2 = canvas.height * (2 - t);
            angle2 = Math.PI / 4;
        } else if (t < 3) {
            // Đỉnh: Chạy từ Trên-Trái -> Trên-Phải
            x2 = canvas.width * (t - 2);
            y2 = 0;
            angle2 = Math.PI * 3 / 4;
        } else {
            // Cạnh phải: Bò từ Trên-Phải -> Dưới-Phải
            x2 = canvas.width;
            y2 = canvas.height * (t - 3);
            angle2 = -Math.PI * 3 / 4;
        }

        // Bắn Tia 1
        enemyBullets.push(new Bullet(x1, y1, angle1, 4, "blue", 7, 2));

        // Bắn Tia 2
        enemyBullets.push(new Bullet(x2, y2, angle2, 4, "blue", 7, 2));
    }
}

else if (cycle < 2200) {

    // 💀 Seija pattern: đạn to + thưa
    if (frame % 40 === 0) {

        let count = 6;

        for (let i = 0; i < count; i++) {

            let ang = (i / count) * Math.PI * 2 + frame * 0.01;

            enemyBullets.push(new Bullet(
                boss.x,
                boss.y,
                ang,
                2,
                "#ff66ff",
                14,
                4
            ));
        }
    }
}

if (cycle >= 2000) {
    spin += 0.03;
} else {
    spin = 0;
}

if (currentPlayer === "reimu" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x - 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
    playerBullets.push(new Bullet(player.x + 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
} 

else if (currentPlayer === "marisa" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x, player.y, -Math.PI/2, 10, "#ffff00", 8, 6));
}

else if (currentPlayer === "sakuya" && frame % 10 === 0) {
    playerBullets.push(
        new Bullet(player.x, player.y, -Math.PI/2, 14, "#3399ff", 3, 10, true) // 👈 bật homing
    );
}

        }

if (timeStop > 0) {
    timeStop--;
}

            if (isGameOver || boss.hp <= 0 || !gameStarted) return;
            if (player.invuln > 0) player.invuln--;
            if (shake > 0) shake *= 0.9;
            if (bombTimer > 0) {
                bombTimer--;
                if (currentPlayer === "marisa") { boss.hp -= 5; shake = 5; } // Master Spark liên tục gây dam
            }
            spawnDanmaku();

arrows.forEach((a, i) => {

});

lasers.forEach(l => {

});

            enemyBullets.forEach((b, i) => {

                if (player.invuln === 0 && Math.hypot(b.x - player.x, b.y - player.y) < player.r + b.radius) { isGameOver = true; alert("GAME OVER"); }
                if (b.y > canvas.height || b.y < 0 || b.x > canvas.width || b.x < 0) enemyBullets.splice(i, 1);
            });

            bombEffects.forEach((orb, i) => {
                orb.update();
                if (Math.hypot(orb.x - boss.x, orb.y - boss.y) < boss.r + orb.radius) { boss.hp -= orb.damage; bombEffects.splice(i, 1); }
            });

            playerBullets.forEach((pb, i) => {
                pb.update();
                if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < boss.r) { boss.hp -= pb.damage; playerBullets.splice(i, 1); }
                if (pb.y < 0) playerBullets.splice(i, 1);
            });
            document.getElementById("hp-val").innerText = Math.max(0, Math.floor(boss.hp));
            if (boss.hp <= 0) { alert("VICTORY!"); }
        }

        function draw() {
            if (!gameStarted) return;
ctx.save();

ctx.translate(canvas.width / 2, canvas.height / 2);
ctx.rotate(spin);
ctx.translate(-canvas.width / 2, -canvas.height / 2);

if (mirror && frame % 2200 >= 400 && frame % 2200 < 1000) {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
}

if (flip && frame % 2200 >= 400 && frame % 2200 < 2000) {
    ctx.translate(canvas.width, canvas.height);

}
ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            ctx.clearRect(-20, -20, canvas.width+40, canvas.height+40);
            if (timeStop > 0) {
    ctx.fillStyle = "rgba(200, 200, 255, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
            // HP Bar
            ctx.fillStyle = "#333"; ctx.fillRect(50, 40, canvas.width - 100, 8);
            ctx.fillStyle = (boss.hp < 1000) ? "red" : "#ff00ff"; ctx.fillRect(50, 40, (canvas.width - 100) * (boss.hp / boss.maxHp), 8);

            if (frame % 2200 >= 1200 && bombTimer === 0) if (timeStop <= 0) {
    lasers.forEach(l => l.draw());
}

            // Master Spark (Marisa)
            if (bombTimer > 0 && currentPlayer === "marisa") {
                let sparkW = Math.sin(bombTimer * 0.1) * 20 + 120;
                let gradient = ctx.createLinearGradient(player.x - sparkW/2, 0, player.x + sparkW/2, 0);
                gradient.addColorStop(0, "rgba(255,255,200,0)"); gradient.addColorStop(0.5, "white"); gradient.addColorStop(1, "rgba(255,255,200,0)");
                ctx.fillStyle = gradient; ctx.fillRect(player.x - sparkW/2, 0, sparkW, player.y);
                ctx.fillStyle = "rgba(255,255,100,0.3)"; ctx.fillRect(player.x - sparkW, 0, sparkW*2, player.y);
            }

            // Vẽ Boss Seija (Đảm bảo imgSeija đã được nạp)
            if (typeof imgSeija !== 'undefined') {
                ctx.drawImage(imgSeija, boss.x - 60, boss.y - 60, 120, 120);
            }

let img = (currentPlayer === "reimu") ? imgReimu :
          (currentPlayer === "marisa") ? imgMarisa :
          imgSakuya;

if (img && img.complete) {
    ctx.drawImage(img, player.x - 20, player.y - 20, 40, 40);
} else {
    // fallback nếu ảnh chưa load
    ctx.fillStyle = (currentPlayer === "reimu") ? "#44aaff" : "#ffff00";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.visualR, 0, Math.PI * 2);
    ctx.fill();
}

                // Tâm né đạn (Hitbox)
                ctx.fillStyle = "lime"; 
                ctx.beginPath(); 
                ctx.arc(player.x, player.y, 3, 0, Math.PI*2);
                ctx.fill();

arrows.forEach(a => a.draw());

            enemyBullets.forEach(b => b.draw());
            playerBullets.forEach(b => b.draw());
            bombEffects.forEach(orb => orb.draw());

if (invert && frame % 2200 >= 400 && frame % 2200 < 1000) {
    ctx.fillStyle = "white";
    ctx.globalCompositeOperation = "difference";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = "source-over";
}
            ctx.restore(); 
            update(); 
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
